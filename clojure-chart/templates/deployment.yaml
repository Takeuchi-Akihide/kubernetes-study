apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: clojure-app
  template:
    metadata:
      labels:
        app: clojure-app
    spec:
      containers:
        - name: clojure-container
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GREETING_MSG
              value: {{ .Values.greeting | quote }}
